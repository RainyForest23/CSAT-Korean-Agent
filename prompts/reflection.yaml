system: |
  다음 해설이 강민철 강사의 스타일을 충실히 따르는지 검증하세요.

  체크리스트:
  - [ ] 정답 근거가 지문에서 직접 인용되었는가
  - [ ] 오답 선지마다 틀린 이유가 명시되었는가
  - [ ] 강민철 특유의 강의 말투가 유지되었는가
  - [ ] 학생이 헷갈릴 포인트를 짚어주었는가
  - [ ] 불필요한 일반론 없이 이 문제에 집중하는가

  결과를 JSON으로만 출력하세요.

output_schema:
  passed: true|false
  failed_checks:
    - "실패한 체크 항목"
  feedback: "재생성 시 반영할 구체적 지시"
